site_name: KooRender Docs
site_url: https://koorender.com/docs/
site_dir: site/docs

theme:
  name: material
  language: zh
  logo: https://qhstaticssl.kujiale.com/image/png/1773645165382/F724EB380400904A6B7BE7EB0000504A.png
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
  palette:
    - scheme: default
      primary: blue
      accent: light-blue

extra:
  alternate:
    - name: 中文
      link: /docs/zh/
      lang: zh
    - name: English
      link: /docs/en/
      lang: en
      
plugins:
  - search

nav:
  - 首页: zh/index.md
  - 快速开始: zh/start.md
  - 使用教程: zh/guide.md
  - 高级配置: zh/config.md

markdown_extensions:
  - toc:
      permalink: true