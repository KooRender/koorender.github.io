<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirecting...</title>
<script>
const userLang = navigator.language || navigator.userLanguage;
if (userLang.startsWith('zh')) {
  window.location.replace("/docs/zh/");
} else {
  window.location.replace("/docs/en/");
}
</script>
</head>
<body></body>
</html>
