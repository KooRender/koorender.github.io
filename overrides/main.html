{% extends "base.html" %}

{% block header %}
{{ super() }}
<div style="position: absolute; top: 15px; right: 80px; z-index: 1000;">
  <select onchange="window.location.href=this.value" style="padding:4px 8px; border-radius:6px; border:1px solid #ccc; font-size:14px;">
    {% if config.language == 'zh' %}
    <option value="{{ page.url | replace('/en/', '/zh/') | prepend: '/docs' }}" selected>中文</option>
    <option value="{{ page.url | replace('/zh/', '/en/') | prepend: '/docs' }}">English</option>
    {% else %}
    <option value="{{ page.url | replace('/en/', '/zh/') | prepend: '/docs' }}">中文</option>
    <option value="{{ page.url | replace('/zh/', '/en/') | prepend: '/docs' }}" selected>English</option>
    {% endif %}
  </select>
</div>
{% endblock %}
